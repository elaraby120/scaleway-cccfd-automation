name: Manage Scaleway MoxeApp Instance - Bureau 9h-21h

on:
  schedule:
    # Créneaux été/hiver pour viser 9h Paris, Lundi à Samedi compris.
    # Minute 17 pour éviter les retards fréquents des crons GitHub au début d'heure.
    - cron: '17 7 * * 1-6'
    - cron: '17 8 * * 1-6'
    # Créneaux été/hiver pour viser 21h Paris, Lundi à Samedi.
    - cron: '17 19 * * 1-6'
    - cron: '17 20 * * 1-6'
    # Arrêt le dimanche à 1h du matin (au cas où l'instance serait encore allumée)
    - cron: '17 23 * * 0'
  
  # Permet de lancer manuellement le workflow
  workflow_dispatch:
    inputs:
      action:
        description: 'Action à effectuer'
        required: true
        default: 'status'
        type: choice
        options:
        - status
        - start
        - stop

jobs:
  manage-instance:
    runs-on: ubuntu-latest
    
    steps:
    - name: Determine action based on schedule
      id: determine-action
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          echo "📋 Manual execution: ${{ github.event.inputs.action }}"
        else
          SCHEDULE="${{ github.event.schedule }}"
          echo "🗓️ Scheduled trigger: $SCHEDULE"

          PARIS_DAY=$(TZ=Europe/Paris date +%u)
          PARIS_HOUR=$(TZ=Europe/Paris date +%H)
          PARIS_DAY_NUM=$((10#$PARIS_DAY))
          PARIS_HOUR_NUM=$((10#$PARIS_HOUR))

          echo "🕐 Paris time: day=$PARIS_DAY_NUM hour=$PARIS_HOUR_NUM"

          if [ "$PARIS_DAY_NUM" -ge 1 ] && [ "$PARIS_DAY_NUM" -le 6 ] && \
             [ "$PARIS_HOUR_NUM" -ge 9 ] && [ "$PARIS_HOUR_NUM" -lt 21 ]; then
            echo "action=start" >> $GITHUB_OUTPUT
            echo "🌅 Business window detected - ensuring instance is running"
          else
            echo "action=stop" >> $GITHUB_OUTPUT
            echo "🌆 Outside business window - ensuring instance is stopped"
          fi
        fi

    - name: Execute Scaleway API call
      run: |
        ACTION="${{ steps.determine-action.outputs.action }}"
        API_URL="https://api.scaleway.com/instance/v1/zones/fr-par-1/servers/${{ secrets.INSTANCE_ID }}"

        echo "🎯 Executing action: $ACTION"

        echo "ℹ️ Getting instance status..."
        STATUS_HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/status.json \
          -H "X-Auth-Token: ${{ secrets.SCALEWAY_TOKEN }}" \
          "$API_URL")

        if [ "$STATUS_HTTP_CODE" != "200" ] || ! jq -e '.server' /tmp/status.json > /dev/null 2>&1; then
          echo "❌ Unable to get instance status"
          echo "HTTP $STATUS_HTTP_CODE"
          cat /tmp/status.json
          exit 1
        fi

        CURRENT_STATUS=$(jq -r '.server.state' /tmp/status.json)
        echo "📊 Instance current status: $CURRENT_STATUS"

        if [ "$ACTION" = "status" ]; then
          exit 0
        elif [ "$ACTION" = "start" ]; then
          if [ "$CURRENT_STATUS" = "running" ] || [ "$CURRENT_STATUS" = "starting" ]; then
            echo "✅ Instance already $CURRENT_STATUS - no start needed"
            exit 0
          fi
          echo "🚀 Starting MoxeApp instance..."
          SCALEWAY_ACTION="poweron"
        elif [ "$ACTION" = "stop" ]; then
          if [ "$CURRENT_STATUS" = "stopped" ] || [ "$CURRENT_STATUS" = "stopping" ]; then
            echo "✅ Instance already $CURRENT_STATUS - no stop needed"
            exit 0
          fi
          echo "🛑 Stopping MoxeApp instance..."
          SCALEWAY_ACTION="poweroff"
        else
          echo "❌ Unsupported action: $ACTION"
          exit 1
        fi

        # Appel API Scaleway pour start/stop
        echo "🔄 Calling Scaleway API..."
        RESPONSE=$(curl -sS -w "%{http_code}" -o /tmp/response.json \
          -X POST \
          -H "X-Auth-Token: ${{ secrets.SCALEWAY_TOKEN }}" \
          -H "Content-Type: application/json" \
          "$API_URL/action" \
          -d "{\"action\": \"$SCALEWAY_ACTION\"}")

        HTTP_CODE="${RESPONSE: -3}"

        if [ "$HTTP_CODE" = "202" ]; then
          echo "✅ Action '$ACTION' executed successfully!"
          echo "📅 Next scheduled action will be automatic"
        else
          echo "❌ Error: HTTP $HTTP_CODE"
          echo "Response:"
          cat /tmp/response.json
          exit 1
        fi

    - name: Summary
      run: |
        ACTION="${{ steps.determine-action.outputs.action }}"
        if [ "$ACTION" != "status" ]; then
          echo "🎉 MoxeApp instance action completed: $ACTION"
          echo "📋 Work schedule: Monday-Saturday 9h-21h Paris time"
          echo "🏖️ Sunday: Instance stopped (no work day)"
        fi
